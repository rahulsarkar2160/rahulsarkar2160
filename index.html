<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Welcome to My Local Website</h1>
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="home">
      <h2>Home</h2>
      <p>This is the home section of the local website.</p>
      <button onclick="showMessage()">Click Me</button>
      <p id="message"></p>
    </section>

    <section id="about">
      <h2>About</h2>
      <p>This website is a simple example of how to use HTML, CSS, and JavaScript.</p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>Email: example@local.com</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Local Website</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
